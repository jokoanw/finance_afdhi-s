<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Finance OS</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #008080; /* Warna khas Retro OS */
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            color: #000;
        }

        /* Desktop Icons */
        .desktop {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .icon {
            text-align: center;
            color: white;
            cursor: pointer;
            width: 80px;
            font-size: 1.3rem;
            text-shadow: 1px 1px 0 #000;
            transition: transform 0.1s;
        }
        .icon:active { transform: scale(0.95); }
        .icon-img {
            width: 50px;
            height: 50px;
            background: #dfdfdf;
            border: 2px solid;
            border-color: #fff #888 #888 #fff;
            margin: 0 auto 5px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        /* Window Style (Lebih rapi dan ke tengah) */
        .window {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #000 #000 #fff;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Bikin posisi persis di tengah */
            width: 380px;
            display: none; /* Disembunyikan dari awal */
            z-index: 10;
        }
        
        .title-bar {
            background: #000080;
            color: white;
            padding: 4px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        .title-bar-btn {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #000 #000 #fff;
            cursor: pointer;
            font-family: 'VT323', monospace;
            font-weight: bold;
            font-size: 1rem;
            padding: 0 5px;
        }
        .title-bar-btn:active { border-color: #000 #fff #fff #000; }

        .window-content { padding: 20px; font-size: 1.2rem; }

        /* Forms & Buttons yang dirapihkan */
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }
        .form-group label { margin-bottom: 4px; }
        input, select, button {
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            box-sizing: border-box;
        }
        input[type="text"], input[type="number"], select {
            border: 2px solid;
            border-color: #888 #fff #fff #888;
            padding: 6px;
            background: #fff;
        }
        .btn {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #fff #000 #000 #fff;
            padding: 8px 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-size: 1.3rem;
        }
        .btn:active { border-color: #000 #fff #fff #000; }

        /* Struk Printer (Receipt) */
        .receipt-paper {
            background: #fff;
            border: 1px solid #888;
            padding: 15px;
            max-height: 350px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        .receipt-header { text-align: center; margin-bottom: 15px; border-bottom: 1px dashed #000; padding-bottom: 10px; }
        .receipt-item {
            margin-bottom: 15px;
            border-bottom: 1px dotted #ccc;
            padding-bottom: 10px;
        }
        .receipt-item img {
            max-width: 100%;
            margin-top: 8px;
            filter: grayscale(100%) contrast(150%);
            image-rendering: pixelated;
            border: 1px solid #ddd;
        }
        .total-row { font-weight: bold; font-size: 1.1rem; text-align: right; margin-top: 10px; }
        .empty-state { text-align: center; font-style: italic; color: #888; padding: 20px 0; }
    </style>
</head>
<body>

    <div class="desktop">
        <div class="icon" onclick="openWindow('input-window')">
            <div class="icon-img">💾</div>
            <span>Input_Data</span>
        </div>
        <div class="icon" onclick="openWindow('receipt-window'); renderReceipt();">
            <div class="icon-img">🖨️</div>
            <span>Cetak_Struk</span>
        </div>
    </div>

    <div class="window" id="input-window">
        <div class="title-bar">
            <span>Catatan_Keuangan.exe</span>
            <button class="title-bar-btn" onclick="closeWindow('input-window')">X</button>
        </div>
        <div class="window-content">
            <form id="finance-form">
                <div class="form-group">
                    <label>Jenis Transaksi:</label>
                    <select id="type">
                        <option value="pemasukan">Pemasukan (+)</option>
                        <option value="pengeluaran">Pengeluaran (-)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Keterangan:</label>
                    <input type="text" id="desc" placeholder="Contoh: Beli Kopi" required>
                </div>

                <div class="form-group">
                    <label>Nominal (Rp):</label>
                    <input type="number" id="amount" placeholder="25000" required>
                </div>

                <div class="form-group">
                    <label>Upload Bukti (Foto):</label>
                    <input type="file" id="proof" accept="image/*" required>
                </div>

                <button type="submit" class="btn">Simpan ke Disket</button>
            </form>
        </div>
    </div>

    <div class="window" id="receipt-window">
        <div class="title-bar">
            <span>Rekap_Mingguan.txt</span>
            <button class="title-bar-btn" onclick="closeWindow('receipt-window')">X</button>
        </div>
        <div class="window-content">
            <div class="receipt-paper" id="receipt-paper">
                </div>
        </div>
    </div>

    <script>
        // Array bener-bener kosong sekarang!
        let transactions = [];

        // Fungsi buka/tutup jendela (otomatis nutup jendela lain biar ga numpuk)
        function openWindow(id) { 
            document.querySelectorAll('.window').forEach(win => win.style.display = 'none');
            document.getElementById(id).style.display = 'block'; 
        }
        function closeWindow(id) { 
            document.getElementById(id).style.display = 'none'; 
        }

        // Fungsi menyimpan data
        document.getElementById('finance-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const type = document.getElementById('type').value;
            const desc = document.getElementById('desc').value;
            const amount = parseInt(document.getElementById('amount').value);
            const proofFile = document.getElementById('proof').files[0];
            const now = new Date();

            if (proofFile) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const newTx = {
                        date: now.toLocaleDateString('id-ID'),
                        time: now.toLocaleTimeString('id-ID'),
                        type: type,
                        desc: desc,
                        amount: amount,
                        proof: event.target.result // Gambar jadi base64 URL
                    };
                    transactions.push(newTx);
                    
                    alert('Data berhasil disimpan ke Disket!');
                    document.getElementById('finance-form').reset();
                    closeWindow('input-window'); // Otomatis tutup jendela setelah simpan
                };
                reader.readAsDataURL(proofFile);
            }
        });

        // Fungsi merender struk
        function renderReceipt() {
            const paper = document.getElementById('receipt-paper');
            let html = `
                <div class="receipt-header">
                    <h2>=== PIXEL FINANCE ===</h2>
                    <p>Rekapitulasi Mingguan</p>
                </div>
            `;

            let saldo = 0;

            if (transactions.length === 0) {
                html += `<div class="empty-state">Belum ada transaksi minggu ini.</div>`;
            } else {
                transactions.forEach(tx => {
                    const isIncome = tx.type === 'pemasukan';
                    saldo += isIncome ? tx.amount : -tx.amount;
                    const sign = isIncome ? '+' : '-';
                    
                    html += `
                        <div class="receipt-item">
                            <div>TGL : ${tx.date} | JAM: ${tx.time}</div>
                            <div>KET : ${tx.desc}</div>
                            <div>NOM : ${sign} Rp ${tx.amount.toLocaleString('id-ID')}</div>
                            ${tx.proof ? `<img src="${tx.proof}" alt="Bukti">` : ''}
                        </div>
                    `;
                });
            }

            html += `
                <div class="receipt-header" style="margin-top: 20px;">
                    <div class="total-row">TOTAL SALDO: Rp ${saldo.toLocaleString('id-ID')}</div>
                    <p style="text-align: center; margin-top: 15px;">*** END OF RECORD ***</p>
                </div>
            `;

            paper.innerHTML = html;
        }
    </script>
</body>
</html>
