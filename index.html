<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Finance OS</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* === GLOBAL SETTINGS === */
        * { box-sizing: border-box; }
        body {
            background-color: #008080;
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            color: #000;
            user-select: none;
        }

        /* === DESKTOP & ICONS === */
        .desktop { padding: 20px; display: flex; flex-direction: column; gap: 25px; height: calc(100vh - 40px); }
        .icon { width: 85px; text-align: center; color: white; cursor: pointer; font-size: 1.2rem; text-shadow: 1px 1px 0 #000; }
        .icon-img { width: 50px; height: 50px; margin: 0 auto 5px auto; font-size: 35px; line-height: 50px; transition: transform 0.1s; }
        .icon:active .icon-img { transform: scale(0.9); }
        .icon-label { background: transparent; padding: 2px 4px; }
        .icon:hover .icon-label { background: #000080; border: 1px dotted #fff; }

        /* === RETRO WINDOW UI === */
        .window {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #dfdfdf #000 #000 #dfdfdf;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.5);
            position: absolute;
            top: 10%;
            left: 30%;
            width: 400px;
            display: none;
            z-index: 10;
        }
        .title-bar { background: #000080; color: white; padding: 3px 5px; display: flex; justify-content: space-between; align-items: center; font-size: 1.3rem; cursor: grab; }
        .title-bar:active { cursor: grabbing; }
        .title-bar-btn { background: #c0c0c0; border: 2px outset #fff; cursor: pointer; font-family: 'VT323', monospace; font-weight: bold; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
        .title-bar-btn:active { border: 2px inset #fff; }
        .window-content { padding: 15px; font-size: 1.2rem; }

        /* === FORMS & INPUTS === */
        .form-group { margin-bottom: 10px; }
        .form-row { display: flex; gap: 10px; }
        .form-row .form-group { flex: 1; }
        label { display: block; margin-bottom: 2px; }
        input, select, button { font-family: 'VT323', monospace; font-size: 1.2rem; width: 100%; }
        input[type="text"], input[type="number"], input[type="date"], input[type="time"], select { border: 2px inset #fff; padding: 6px; background: #fff; outline: none; }
        .btn { background: #c0c0c0; border: 2px outset #fff; padding: 8px; cursor: pointer; margin-top: 10px; font-size: 1.3rem; }
        .btn:active { border: 2px inset #fff; }
        .preview-box { width: 100%; height: 70px; border: 2px inset #fff; background: #000; margin-top: 5px; display: flex; align-items: center; justify-content: center; color: #00ff00; overflow: hidden; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(150%); image-rendering: pixelated; }

        /* === RECEIPT WINDOW SETTINGS === */
        #receipt-window { width: 450px; left: 40%; }
        .receipt-scroll-area {
            background: #808080;
            padding: 20px 30px;
            max-height: 400px;
            overflow-y: auto;
            border: 2px inset #fff;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* === REALISTIC THERMAL PAPER DESIGN === */
        .thermal-paper {
            background-color: #fffdf5; /* Kertas thermal agak kekuningan */
            color: #111;
            font-family: 'Courier New', Courier, monospace; /* Font murni kasir */
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            padding: 20px 15px 30px 15px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        /* Efek sobekan zigzag di bawah struk */
        .thermal-paper::after {
            content: "";
            display: block;
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(-45deg, transparent 33.33%, #fffdf5 33.33%, #fffdf5 66.66%, transparent 66.66%),
                        linear-gradient(45deg, transparent 33.33%, #fffdf5 33.33%, #fffdf5 66.66%, transparent 66.66%);
            background-size: 10px 20px;
        }

        /* Typography & Layout Struk */
        .pos-center { text-align: center; }
        .pos-line { border-bottom: 2px dashed #333; margin: 10px 0; }
        .pos-date { font-size: 11px; margin-bottom: 2px; color: #444; }
        
        .pos-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end;
            margin-bottom: 5px; 
        }
        .pos-desc { flex: 1; padding-right: 10px; word-break: break-word; }
        .pos-amount { text-align: right; white-space: nowrap; }
        
        /* Gambar seolah tercetak tinta hitam di kertas */
        .pos-img { 
            width: 100%; 
            max-width: 180px; 
            display: block; 
            margin: 8px auto; 
            border: 1px solid #333;
            filter: grayscale(100%) contrast(200%) brightness(1.1); 
            mix-blend-mode: multiply; /* Kunci biar gambar nyatu sama kertas */
            image-rendering: pixelated;
        }

        /* Barcode CSS murni */
        .pos-barcode {
            height: 40px;
            width: 80%;
            margin: 15px auto 0 auto;
            background: repeating-linear-gradient(
                90deg,
                #111 0, #111 2px,
                transparent 2px, transparent 4px,
                #111 4px, #111 6px,
                transparent 6px, transparent 7px,
                #111 7px, #111 10px
            );
        }

        .delete-btn {
            background: transparent; border: 1px solid #111; color: #111;
            cursor: pointer; font-family: 'Courier New', Courier, monospace;
            font-size: 10px; padding: 2px 5px; margin-top: 5px; font-weight: bold;
        }
        .delete-btn:hover { background: #111; color: #fffdf5; }

        /* Tombol Aksi */
        .action-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .btn-pdf { background: #000080; color: #fff; }
        .btn-pdf:active { border-color: #000; }
        .btn-danger { color: #800000; font-weight: bold; }

        /* === TASKBAR === */
        .taskbar { position: absolute; bottom: 0; left: 0; width: 100%; height: 40px; background: #c0c0c0; border-top: 2px outset #fff; display: flex; justify-content: space-between; align-items: center; padding: 0 5px; z-index: 100; }
        .start-btn { background: #c0c0c0; border: 2px outset #fff; padding: 4px 10px; font-family: 'VT323', monospace; font-size: 1.3rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .start-btn:active { border: 2px inset #fff; }
        .clock { border: 2px inset #fff; padding: 4px 10px; font-size: 1.2rem; background: #fff;}
    </style>
</head>
<body>

    <div class="desktop">
        <div class="icon" onclick="openWindow('input-window')" ondblclick="openWindow('input-window')">
            <div class="icon-img">💾</div>
            <span class="icon-label">Input.exe</span>
        </div>
        <div class="icon" onclick="openWindow('receipt-window'); renderReceipt();">
            <div class="icon-img">🖨️</div>
            <span class="icon-label">Rekap.txt</span>
        </div>
        <div class="icon" onclick="formatDisket()">
            <div class="icon-img">🗑️</div>
            <span class="icon-label">Format_C</span>
        </div>
    </div>

    <div class="window" id="input-window">
        <div class="title-bar" onmousedown="dragWindow(event, 'input-window')">
            <span>Input_Keuangan.exe</span>
            <button class="title-bar-btn" onclick="closeWindow('input-window')">X</button>
        </div>
        <div class="window-content">
            <form id="finance-form">
                <div class="form-row">
                    <div class="form-group"><label>Tanggal:</label><input type="date" id="tx-date" required></div>
                    <div class="form-group"><label>Jam:</label><input type="time" id="tx-time" required></div>
                </div>
                <div class="form-group">
                    <label>Tipe Transaksi:</label>
                    <select id="type">
                        <option value="pemasukan">Pemasukan (IN)</option>
                        <option value="pengeluaran">Pengeluaran (OUT)</option>
                    </select>
                </div>
                <div class="form-group"><label>Keterangan:</label><input type="text" id="desc" placeholder="Contoh: Beli Kopi" autocomplete="off" required></div>
                <div class="form-group"><label>Nominal (Rp):</label><input type="number" id="amount" placeholder="25000" required></div>
                <div class="form-group">
                    <label>Bukti Transaksi:</label>
                    <input type="file" id="proof" accept="image/*" onchange="previewImage(event)">
                    <div class="preview-box" id="preview-box">NO SIGNAL</div>
                </div>
                <button type="submit" class="btn">Simpan Data >></button>
            </form>
        </div>
    </div>

    <div class="window" id="receipt-window">
        <div class="title-bar" onmousedown="dragWindow(event, 'receipt-window')">
            <span>Rekap_Mingguan.txt</span>
            <button class="title-bar-btn" onclick="closeWindow('receipt-window')">X</button>
        </div>
        <div class="window-content">
            
            <div class="receipt-scroll-area">
                <div class="thermal-paper" id="thermal-paper">
                    </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-pdf" onclick="downloadPDF()">📥 Cetak PDF</button>
                <button class="btn btn-danger" onclick="formatDisket()">🗑️ Format Data</button>
            </div>

        </div>
    </div>

    <div class="taskbar">
        <button class="start-btn">💻 Start</button>
        <div class="clock" id="clock">00:00:00</div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('pixelFinanceData')) || [];
        let draggedWindow = null;
        let zIndexCounter = 10;

        function setCurrentDateTime() {
            const now = new Date();
            document.getElementById('tx-date').value = now.toISOString().split('T')[0];
            document.getElementById('tx-time').value = now.toTimeString().split(' ')[0].substring(0,5);
        }
        setCurrentDateTime();

        function openWindow(id) { 
            const win = document.getElementById(id);
            win.style.display = 'block'; 
            win.style.zIndex = ++zIndexCounter;
            if(id === 'input-window') setCurrentDateTime();
        }
        function closeWindow(id) { document.getElementById(id).style.display = 'none'; }

        function dragWindow(e, windowId) {
            draggedWindow = document.getElementById(windowId);
            draggedWindow.style.zIndex = ++zIndexCounter;
            let offsetX = e.clientX - draggedWindow.getBoundingClientRect().left;
            let offsetY = e.clientY - draggedWindow.getBoundingClientRect().top;
            function mouseMoveHandler(e) {
                draggedWindow.style.left = (e.clientX - offsetX) + 'px';
                draggedWindow.style.top = (e.clientY - offsetY) + 'px';
            }
            function mouseUpHandler() {
                document.removeEventListener('mousemove', mouseMoveHandler);
                document.removeEventListener('mouseup', mouseUpHandler);
            }
            document.addEventListener('mousemove', mouseMoveHandler);
            document.addEventListener('mouseup', mouseUpHandler);
        }

        let currentImageBase64 = '';
        function previewImage(event) {
            const file = event.target.files[0];
            const box = document.getElementById('preview-box');
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImageBase64 = e.target.result;
                    box.innerHTML = `<img src="${currentImageBase64}">`;
                }
                reader.readAsDataURL(file);
            } else {
                currentImageBase64 = '';
                box.innerHTML = "NO SIGNAL";
            }
        }

        document.getElementById('finance-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const txDate = document.getElementById('tx-date').value;
            const txTime = document.getElementById('tx-time').value;
            const type = document.getElementById('type').value;
            const desc = document.getElementById('desc').value;
            const amount = parseInt(document.getElementById('amount').value);

            transactions.push({ id: Date.now(), date: txDate, time: txTime, type: type, desc: desc, amount: amount, proof: currentImageBase64 });
            transactions.sort((a, b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));
            saveData();
            
            document.getElementById('finance-form').reset();
            document.getElementById('preview-box').innerHTML = "NO SIGNAL";
            currentImageBase64 = '';
            setCurrentDateTime();
            
            if(document.getElementById('receipt-window').style.display === 'block') { renderReceipt(); }
        });

        function renderReceipt() {
            const paper = document.getElementById('thermal-paper');
            const now = new Date();
            
            let html = `
                <div class="pos-center">
                    <h2>AFDHI'S FINANCE WEEKLY</h2>
                    <div>Dibuat dengan transparansi tinggi</div>
                    <div style="font-size: 10px;">PURWOKERTO - INDONESIA</div>
                </div>
                <div class="pos-line"></div>
                <div>TANGGAL CETAK: ${now.toLocaleDateString('id-ID')} ${now.toLocaleTimeString('id-ID')}</div>
                <div class="pos-line"></div>
            `;

            let saldo = 0;

            if (transactions.length === 0) {
                html += `<div class="pos-center" style="padding: 20px 0;">-- BELUM ADA TRANSAKSI --</div>`;
            } else {
                transactions.forEach((tx) => {
                    const isIncome = tx.type === 'pemasukan';
                    saldo += isIncome ? tx.amount : -tx.amount;
                    const code = isIncome ? 'IN ' : 'OUT';
                    
                    html += `
                        <div style="margin-bottom: 15px;">
                            <div class="pos-date">${tx.date} - ${tx.time}</div>
                            <div class="pos-row">
                                <span class="pos-desc">${code} | ${tx.desc}</span>
                                <span class="pos-amount">${tx.amount.toLocaleString('id-ID')}</span>
                            </div>
                            ${tx.proof ? `<img src="${tx.proof}" class="pos-img" alt="Bukti">` : ''}
                            <button class="delete-btn" onclick="deleteItem(${tx.id})" data-html2canvas-ignore="true">VOID ITEM</button>
                        </div>
                    `;
                });
            }

            html += `
                <div class="pos-line"></div>
                <div class="pos-row" style="font-size: 15px; font-weight: bold;">
                    <span>TOTAL SALDO :</span>
                    <span>Rp ${saldo.toLocaleString('id-ID')}</span>
                </div>
                <div class="pos-line"></div>
                <div class="pos-center" style="margin-top: 20px;">
                    <div>TERIMA KASIH</div>
                    <div>SIMPAN STRUK INI SEBAGAI BUKTI</div>
                    <div class="pos-barcode"></div>
                    <div style="font-size: 10px; margin-top:5px;">*** SYSTEM GENERATED ***</div>
                </div>
            `;
            paper.innerHTML = html;
        }

        function deleteItem(id) {
            if(confirm('Void transaksi ini dari struk?')) {
                transactions = transactions.filter(tx => tx.id !== id);
                saveData();
                renderReceipt();
            }
        }

        function formatDisket() {
            if(transactions.length === 0) return;
            if(confirm('WARNING: Hapus semua data mingguan?')) {
                transactions = [];
                saveData();
                renderReceipt();
            }
        }

        function saveData() { localStorage.setItem('pixelFinanceData', JSON.stringify(transactions)); }

        function downloadPDF() {
            if(transactions.length === 0) return alert('Struk kosong!');
            
            const element = document.getElementById('thermal-paper');
            // Sedikit penyesuaian styling untuk proses PDF agar tidak terpotong
            element.style.boxShadow = 'none'; 
            
            const opt = {
                margin:       [0.2, 0.2, 0.5, 0.2], // Margin untuk PDF (atas, kiri, bawah, kanan)
                filename:     'Afdhis_Finance_Weekly.pdf',
                image:        { type: 'jpeg', quality: 1 },
                html2canvas:  { scale: 2, useCORS: true, backgroundColor: '#fffdf5' },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                element.style.boxShadow = '0 4px 8px rgba(0,0,0,0.3)';
            });
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID');
        }, 1000);

    </script>
</body>
</html>
