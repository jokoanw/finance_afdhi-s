<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Finance OS</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        /* === GLOBAL SETTINGS === */
        * { box-sizing: border-box; }
        body {
            background-color: #008080; /* Classic Teal Desktop */
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            color: #000;
            user-select: none; /* Biar teks ga gampang ke-blok pas nge-drag */
        }

        /* === DESKTOP & ICONS === */
        .desktop {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            height: calc(100vh - 40px);
        }
        .icon {
            width: 80px;
            text-align: center;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            text-shadow: 1px 1px 0 #000;
        }
        .icon-img {
            width: 50px;
            height: 50px;
            margin: 0 auto 5px auto;
            font-size: 35px;
            line-height: 50px;
            transition: transform 0.1s;
        }
        .icon:active .icon-img { transform: scale(0.9); }
        .icon-label {
            background: transparent;
            padding: 2px 4px;
        }
        .icon:hover .icon-label { background: #000080; border: 1px dotted #fff; }

        /* === RETRO WINDOW UI === */
        .window {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #dfdfdf #000 #000 #dfdfdf;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.5);
            position: absolute;
            top: 20%;
            left: 30%;
            width: 380px;
            display: none;
            z-index: 10;
        }
        .title-bar {
            background: #000080;
            color: white;
            padding: 3px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.3rem;
            cursor: grab;
        }
        .title-bar:active { cursor: grabbing; }
        .title-bar-btn {
            background: #c0c0c0;
            border: 2px outset #fff;
            cursor: pointer;
            font-family: 'VT323', monospace;
            font-weight: bold;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .title-bar-btn:active { border: 2px inset #fff; }
        .window-content { padding: 15px; font-size: 1.2rem; }

        /* === FORMS & INPUTS === */
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; }
        input, select, button {
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            width: 100%;
        }
        input[type="text"], input[type="number"], select {
            border: 2px inset #fff;
            padding: 6px;
            background: #fff;
            outline: none;
        }
        .btn {
            background: #c0c0c0;
            border: 2px outset #fff;
            padding: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 1.3rem;
        }
        .btn:active { border: 2px inset #fff; }
        .btn-danger { color: #800000; font-weight: bold; }

        /* Image Preview Box */
        .preview-box {
            width: 100%;
            height: 80px;
            border: 2px inset #fff;
            background: #000;
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00ff00;
            overflow: hidden;
        }
        .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(150%);
            image-rendering: pixelated;
        }

        /* === RECEIPT (STRUK KASIR) === */
        #receipt-window { width: 420px; }
        .receipt-paper {
            background: #fff;
            border: 1px solid #888;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        .receipt-header { text-align: center; margin-bottom: 15px; border-bottom: 2px dashed #000; padding-bottom: 10px; }
        .receipt-item {
            margin-bottom: 15px;
            border-bottom: 1px dotted #ccc;
            padding-bottom: 10px;
            position: relative;
        }
        .receipt-item img {
            max-width: 100%;
            margin-top: 8px;
            filter: grayscale(100%) contrast(150%);
            image-rendering: pixelated;
            border: 1px solid #000;
        }
        .delete-btn {
            position: absolute;
            top: 0;
            right: 0;
            background: #fff;
            border: 1px solid #000;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }
        .delete-btn:hover { background: #000; color: #fff; }
        .total-row { font-weight: bold; font-size: 1.2rem; text-align: right; margin-top: 10px; border-top: 2px dashed #000; padding-top: 10px;}

        /* === TASKBAR === */
        .taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: #c0c0c0;
            border-top: 2px outset #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
            z-index: 100;
        }
        .start-btn {
            background: #c0c0c0;
            border: 2px outset #fff;
            padding: 4px 10px;
            font-family: 'VT323', monospace;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .start-btn:active { border: 2px inset #fff; }
        .clock {
            border: 2px inset #fff;
            padding: 4px 10px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="desktop">
        <div class="icon" onclick="openWindow('input-window')" ondblclick="openWindow('input-window')">
            <div class="icon-img">💾</div>
            <span class="icon-label">Input.exe</span>
        </div>
        <div class="icon" onclick="openWindow('receipt-window'); renderReceipt();">
            <div class="icon-img">🖨️</div>
            <span class="icon-label">Rekap.txt</span>
        </div>
        <div class="icon" onclick="formatDisket()">
            <div class="icon-img">🗑️</div>
            <span class="icon-label">Format_Disk</span>
        </div>
    </div>

    <div class="window" id="input-window">
        <div class="title-bar" onmousedown="dragWindow(event, 'input-window')">
            <span>Input_Keuangan.exe</span>
            <button class="title-bar-btn" onclick="closeWindow('input-window')">X</button>
        </div>
        <div class="window-content">
            <form id="finance-form">
                <div class="form-group">
                    <label>Tipe Transaksi:</label>
                    <select id="type">
                        <option value="pemasukan">Pemasukan (+)</option>
                        <option value="pengeluaran">Pengeluaran (-)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Keterangan:</label>
                    <input type="text" id="desc" placeholder="Contoh: Beli Kopi" autocomplete="off" required>
                </div>
                <div class="form-group">
                    <label>Nominal (Rp):</label>
                    <input type="number" id="amount" placeholder="25000" required>
                </div>
                <div class="form-group">
                    <label>Bukti Transaksi:</label>
                    <input type="file" id="proof" accept="image/*" onchange="previewImage(event)">
                    <div class="preview-box" id="preview-box">NO SIGNAL</div>
                </div>
                <button type="submit" class="btn">Write to Disk >></button>
            </form>
        </div>
    </div>

    <div class="window" id="receipt-window">
        <div class="title-bar" onmousedown="dragWindow(event, 'receipt-window')">
            <span>Rekap_Mingguan.txt</span>
            <button class="title-bar-btn" onclick="closeWindow('receipt-window')">X</button>
        </div>
        <div class="window-content">
            <div class="receipt-paper" id="receipt-paper">
                </div>
            <button class="btn btn-danger" onclick="formatDisket()">Hapus Semua Data</button>
        </div>
    </div>

    <div class="taskbar">
        <button class="start-btn">💻 Start</button>
        <div class="clock" id="clock">00:00:00</div>
    </div>

    <script>
        // Database Lokal Sementara
        let transactions = JSON.parse(localStorage.getItem('pixelFinanceData')) || [];
        let draggedWindow = null;

        // 1. Fungsi Buka Tutup Jendela (dengan efek Z-index agar yang diklik pindah ke depan)
        let zIndexCounter = 10;
        function openWindow(id) { 
            const win = document.getElementById(id);
            win.style.display = 'block'; 
            win.style.zIndex = ++zIndexCounter;
        }
        function closeWindow(id) { document.getElementById(id).style.display = 'none'; }

        // 2. Fitur Drag Jendela
        function dragWindow(e, windowId) {
            draggedWindow = document.getElementById(windowId);
            draggedWindow.style.zIndex = ++zIndexCounter;
            
            let offsetX = e.clientX - draggedWindow.getBoundingClientRect().left;
            let offsetY = e.clientY - draggedWindow.getBoundingClientRect().top;

            function mouseMoveHandler(e) {
                draggedWindow.style.left = (e.clientX - offsetX) + 'px';
                draggedWindow.style.top = (e.clientY - offsetY) + 'px';
            }
            function mouseUpHandler() {
                document.removeEventListener('mousemove', mouseMoveHandler);
                document.removeEventListener('mouseup', mouseUpHandler);
            }
            document.addEventListener('mousemove', mouseMoveHandler);
            document.addEventListener('mouseup', mouseUpHandler);
        }

        // 3. Preview Gambar Bukti Transaksi
        let currentImageBase64 = '';
        function previewImage(event) {
            const file = event.target.files[0];
            const box = document.getElementById('preview-box');
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImageBase64 = e.target.result;
                    box.innerHTML = `<img src="${currentImageBase64}">`;
                }
                reader.readAsDataURL(file);
            } else {
                currentImageBase64 = '';
                box.innerHTML = "NO SIGNAL";
            }
        }

        // 4. Submit Form Data
        document.getElementById('finance-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const type = document.getElementById('type').value;
            const desc = document.getElementById('desc').value;
            const amount = parseInt(document.getElementById('amount').value);
            const now = new Date();

            const newTx = {
                id: Date.now(), // ID unik untuk fitur hapus
                date: now.toLocaleDateString('id-ID'),
                time: now.toLocaleTimeString('id-ID'),
                type: type,
                desc: desc,
                amount: amount,
                proof: currentImageBase64
            };

            transactions.push(newTx);
            saveData();
            
            alert('Data tertulis ke disket!');
            document.getElementById('finance-form').reset();
            document.getElementById('preview-box').innerHTML = "NO SIGNAL";
            currentImageBase64 = '';
            
            // Render ulang struk kalau jendelanya lagi kebuka
            if(document.getElementById('receipt-window').style.display === 'block') {
                renderReceipt();
            }
        });

        // 5. Render Struk (Cetak Struk)
        function renderReceipt() {
            const paper = document.getElementById('receipt-paper');
            let html = `
                <div class="receipt-header">
                    <h2>=== PIXEL FINANCE ===</h2>
                    <p>SYSTEM REKAP v2.0</p>
                </div>
            `;

            let saldo = 0;

            if (transactions.length === 0) {
                html += `<div style="text-align:center; padding: 20px 0;">[ DISKET KOSONG ]</div>`;
            } else {
                transactions.forEach((tx, index) => {
                    const isIncome = tx.type === 'pemasukan';
                    saldo += isIncome ? tx.amount : -tx.amount;
                    const sign = isIncome ? '+' : '-';
                    
                    html += `
                        <div class="receipt-item">
                            <button class="delete-btn" onclick="deleteItem(${tx.id})" title="Hapus Transaksi Ini">X</button>
                            <div>TGL: ${tx.date} | ${tx.time}</div>
                            <div>KET: ${tx.desc}</div>
                            <div>NOM: ${sign} Rp ${tx.amount.toLocaleString('id-ID')}</div>
                            ${tx.proof ? `<img src="${tx.proof}" alt="Bukti">` : ''}
                        </div>
                    `;
                });
            }

            html += `
                <div class="total-row">SALDO AKHIR: Rp ${saldo.toLocaleString('id-ID')}</div>
                <div style="text-align:center; margin-top:20px;">*** END OF RECORD ***</div>
            `;
            paper.innerHTML = html;
        }

        // 6. Fitur Hapus Per Item
        function deleteItem(id) {
            if(confirm('Hapus transaksi ini dari sistem?')) {
                transactions = transactions.filter(tx => tx.id !== id);
                saveData();
                renderReceipt();
            }
        }

        // 7. Fitur Format Disket (Hapus Semua)
        function formatDisket() {
            if(transactions.length === 0) {
                alert('Disket sudah kosong!');
                return;
            }
            if(confirm('WARNING: Format Disket? Semua data keuangan minggu ini akan hilang permanen!')) {
                transactions = [];
                saveData();
                renderReceipt();
                alert('Format berhasil. Disket kosong.');
            }
        }

        // 8. Simpan ke Local Storage (biar ga ilang pas direfresh)
        function saveData() {
            localStorage.setItem('pixelFinanceData', JSON.stringify(transactions));
        }

        // 9. Live Clock di Taskbar
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID');
        }, 1000);

    </script>
</body>
</html>
