<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Finance OS</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* === GLOBAL SETTINGS === */
        * { box-sizing: border-box; }
        body {
            background-color: #008080;
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            color: #000;
            user-select: none;
        }

        /* === DESKTOP & ICONS === */
        .desktop { padding: 20px; display: flex; flex-direction: column; gap: 25px; height: calc(100vh - 40px); }
        .icon { width: 85px; text-align: center; color: white; cursor: pointer; font-size: 1.2rem; text-shadow: 1px 1px 0 #000; }
        .icon-img { width: 50px; height: 50px; margin: 0 auto 5px auto; font-size: 35px; line-height: 50px; transition: transform 0.1s; }
        .icon:active .icon-img { transform: scale(0.9); }
        .icon-label { background: transparent; padding: 2px 4px; }
        .icon:hover .icon-label { background: #000080; border: 1px dotted #fff; }

        /* === RETRO WINDOW UI === */
        .window {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #dfdfdf #000 #000 #dfdfdf;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.5);
            position: absolute;
            top: 10%;
            left: 30%;
            width: 400px;
            display: none;
            z-index: 10;
        }
        .title-bar {
            background: #000080;
            color: white;
            padding: 3px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.3rem;
            cursor: grab;
        }
        .title-bar:active { cursor: grabbing; }
        .title-bar-btn {
            background: #c0c0c0;
            border: 2px outset #fff;
            cursor: pointer;
            font-family: 'VT323', monospace;
            font-weight: bold;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .title-bar-btn:active { border: 2px inset #fff; }
        .window-content { padding: 15px; font-size: 1.2rem; }

        /* === FORMS & INPUTS === */
        .form-group { margin-bottom: 10px; }
        .form-row { display: flex; gap: 10px; } /* Untuk sebaris Tanggal & Jam */
        .form-row .form-group { flex: 1; }
        label { display: block; margin-bottom: 2px; }
        input, select, button { font-family: 'VT323', monospace; font-size: 1.2rem; width: 100%; }
        input[type="text"], input[type="number"], input[type="date"], input[type="time"], select {
            border: 2px inset #fff;
            padding: 6px;
            background: #fff;
            outline: none;
        }
        .btn { background: #c0c0c0; border: 2px outset #fff; padding: 8px; cursor: pointer; margin-top: 10px; font-size: 1.3rem; }
        .btn:active { border: 2px inset #fff; }
        
        .preview-box { width: 100%; height: 70px; border: 2px inset #fff; background: #000; margin-top: 5px; display: flex; align-items: center; justify-content: center; color: #00ff00; overflow: hidden; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(150%); image-rendering: pixelated; }

        /* === RECEIPT (STRUK KASIR YANG DIRAPIHKAN) === */
        #receipt-window { width: 450px; left: 40%; }
        
        /* Area ini yang akan diubah jadi PDF */
        .receipt-paper {
            background: #fff;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            color: #000;
            border: 1px solid #888;
        }
        .receipt-header { text-align: center; margin-bottom: 15px; border-bottom: 2px dashed #000; padding-bottom: 10px; }
        
        /* Layout Grid supaya rapi banget */
        .receipt-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 5px;
            margin-bottom: 15px;
            border-bottom: 1px dotted #888;
            padding-bottom: 10px;
            position: relative;
        }
        .item-details { display: flex; flex-direction: column; gap: 3px; }
        .item-date { font-size: 0.85rem; color: #555; }
        .item-desc { font-weight: bold; }
        .item-amount { font-size: 1.1rem; }
        .item-img-container { width: 80px; text-align: right; }
        .item-img-container img {
            width: 100%;
            border: 1px solid #000;
            filter: grayscale(100%) contrast(150%);
            image-rendering: pixelated;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: red;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            text-align: left;
            padding: 0;
            margin-top: 5px;
            text-decoration: underline;
        }
        .delete-btn:hover { color: darkred; }

        .total-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem; margin-top: 15px; border-top: 2px dashed #000; padding-top: 10px;}
        
        /* Tombol Aksi di bawah struk */
        .action-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .btn-pdf { background: #000080; color: #fff; }
        .btn-pdf:active { border-color: #000; }
        .btn-danger { color: #800000; font-weight: bold; }

        /* === TASKBAR === */
        .taskbar { position: absolute; bottom: 0; left: 0; width: 100%; height: 40px; background: #c0c0c0; border-top: 2px outset #fff; display: flex; justify-content: space-between; align-items: center; padding: 0 5px; z-index: 100; }
        .start-btn { background: #c0c0c0; border: 2px outset #fff; padding: 4px 10px; font-family: 'VT323', monospace; font-size: 1.3rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .start-btn:active { border: 2px inset #fff; }
        .clock { border: 2px inset #fff; padding: 4px 10px; font-size: 1.2rem; background: #fff;}
    </style>
</head>
<body>

    <div class="desktop">
        <div class="icon" onclick="openWindow('input-window')" ondblclick="openWindow('input-window')">
            <div class="icon-img">💾</div>
            <span class="icon-label">Input.exe</span>
        </div>
        <div class="icon" onclick="openWindow('receipt-window'); renderReceipt();">
            <div class="icon-img">🖨️</div>
            <span class="icon-label">Rekap.txt</span>
        </div>
        <div class="icon" onclick="formatDisket()">
            <div class="icon-img">🗑️</div>
            <span class="icon-label">Format_C</span>
        </div>
    </div>

    <div class="window" id="input-window">
        <div class="title-bar" onmousedown="dragWindow(event, 'input-window')">
            <span>Input_Keuangan.exe</span>
            <button class="title-bar-btn" onclick="closeWindow('input-window')">X</button>
        </div>
        <div class="window-content">
            <form id="finance-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Tanggal:</label>
                        <input type="date" id="tx-date" required>
                    </div>
                    <div class="form-group">
                        <label>Jam:</label>
                        <input type="time" id="tx-time" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Tipe Transaksi:</label>
                    <select id="type">
                        <option value="pemasukan">Pemasukan (+)</option>
                        <option value="pengeluaran">Pengeluaran (-)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Keterangan:</label>
                    <input type="text" id="desc" placeholder="Contoh: Beli Kopi" autocomplete="off" required>
                </div>
                <div class="form-group">
                    <label>Nominal (Rp):</label>
                    <input type="number" id="amount" placeholder="25000" required>
                </div>
                <div class="form-group">
                    <label>Bukti Transaksi:</label>
                    <input type="file" id="proof" accept="image/*" onchange="previewImage(event)">
                    <div class="preview-box" id="preview-box">NO SIGNAL</div>
                </div>
                <button type="submit" class="btn">Simpan Data >></button>
            </form>
        </div>
    </div>

    <div class="window" id="receipt-window">
        <div class="title-bar" onmousedown="dragWindow(event, 'receipt-window')">
            <span>Rekap_Mingguan.txt</span>
            <button class="title-bar-btn" onclick="closeWindow('receipt-window')">X</button>
        </div>
        <div class="window-content">
            
            <div class="receipt-paper" id="receipt-paper">
                </div>

            <div class="action-buttons">
                <button class="btn btn-pdf" onclick="downloadPDF()">📥 Download PDF</button>
                <button class="btn btn-danger" onclick="formatDisket()">🗑️ Hapus Semua</button>
            </div>

        </div>
    </div>

    <div class="taskbar">
        <button class="start-btn">💻 Start</button>
        <div class="clock" id="clock">00:00:00</div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('pixelFinanceData')) || [];
        let draggedWindow = null;
        let zIndexCounter = 10;

        // Set Default Date & Time ke Waktu Sekarang saat Web Dibuka
        function setCurrentDateTime() {
            const now = new Date();
            // Format YYYY-MM-DD untuk input type="date"
            const dateString = now.toISOString().split('T')[0];
            // Format HH:MM untuk input type="time"
            const timeString = now.toTimeString().split(' ')[0].substring(0,5);
            
            document.getElementById('tx-date').value = dateString;
            document.getElementById('tx-time').value = timeString;
        }
        setCurrentDateTime(); // Panggil saat pertama kali load

        // Fungsi Buka Tutup Jendela
        function openWindow(id) { 
            const win = document.getElementById(id);
            win.style.display = 'block'; 
            win.style.zIndex = ++zIndexCounter;
            if(id === 'input-window') setCurrentDateTime(); // Update jam tiap buka form input
        }
        function closeWindow(id) { document.getElementById(id).style.display = 'none'; }

        // Fitur Drag Jendela
        function dragWindow(e, windowId) {
            draggedWindow = document.getElementById(windowId);
            draggedWindow.style.zIndex = ++zIndexCounter;
            let offsetX = e.clientX - draggedWindow.getBoundingClientRect().left;
            let offsetY = e.clientY - draggedWindow.getBoundingClientRect().top;
            function mouseMoveHandler(e) {
                draggedWindow.style.left = (e.clientX - offsetX) + 'px';
                draggedWindow.style.top = (e.clientY - offsetY) + 'px';
            }
            function mouseUpHandler() {
                document.removeEventListener('mousemove', mouseMoveHandler);
                document.removeEventListener('mouseup', mouseUpHandler);
            }
            document.addEventListener('mousemove', mouseMoveHandler);
            document.addEventListener('mouseup', mouseUpHandler);
        }

        // Preview Gambar
        let currentImageBase64 = '';
        function previewImage(event) {
            const file = event.target.files[0];
            const box = document.getElementById('preview-box');
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImageBase64 = e.target.result;
                    box.innerHTML = `<img src="${currentImageBase64}">`;
                }
                reader.readAsDataURL(file);
            } else {
                currentImageBase64 = '';
                box.innerHTML = "NO SIGNAL";
            }
        }

        // Submit Form Data
        document.getElementById('finance-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const txDate = document.getElementById('tx-date').value; // Ambil dari input kalender
            const txTime = document.getElementById('tx-time').value; // Ambil dari input jam
            const type = document.getElementById('type').value;
            const desc = document.getElementById('desc').value;
            const amount = parseInt(document.getElementById('amount').value);

            const newTx = {
                id: Date.now(),
                date: txDate,
                time: txTime,
                type: type,
                desc: desc,
                amount: amount,
                proof: currentImageBase64
            };

            transactions.push(newTx);
            
            // Urutkan transaksi berdasarkan tanggal dan jam (terlama ke terbaru)
            transactions.sort((a, b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));
            
            saveData();
            
            alert('Data berhasil disimpan!');
            document.getElementById('finance-form').reset();
            document.getElementById('preview-box').innerHTML = "NO SIGNAL";
            currentImageBase64 = '';
            setCurrentDateTime(); // Reset jam ke waktu terbaru
            
            if(document.getElementById('receipt-window').style.display === 'block') {
                renderReceipt();
            }
        });

        // Render Struk (Grid System biar rapi)
        function renderReceipt() {
            const paper = document.getElementById('receipt-paper');
            let html = `
                <div class="receipt-header">
                    <h2>=== PIXEL FINANCE ===</h2>
                    <p>SYSTEM REKAP MINGGUAN</p>
                </div>
            `;

            let saldo = 0;

            if (transactions.length === 0) {
                html += `<div style="text-align:center; padding: 20px 0;">[ DATA KOSONG ]</div>`;
            } else {
                transactions.forEach((tx) => {
                    const isIncome = tx.type === 'pemasukan';
                    saldo += isIncome ? tx.amount : -tx.amount;
                    const sign = isIncome ? '+' : '-';
                    const color = isIncome ? 'green' : 'black';
                    
                    html += `
                        <div class="receipt-item">
                            <div class="item-details">
                                <span class="item-date">📅 ${tx.date} ⏰ ${tx.time}</span>
                                <span class="item-desc">${tx.desc}</span>
                                <span class="item-amount" style="color:${color};">${sign} Rp ${tx.amount.toLocaleString('id-ID')}</span>
                                <button class="delete-btn" onclick="deleteItem(${tx.id})" data-html2canvas-ignore="true">[x] Hapus Item</button>
                            </div>
                            <div class="item-img-container">
                                ${tx.proof ? `<img src="${tx.proof}" alt="Bukti">` : '<span style="font-size:10px;">No IMG</span>'}
                            </div>
                        </div>
                    `;
                });
            }

            html += `
                <div class="total-row">
                    <span>SALDO AKHIR:</span>
                    <span>Rp ${saldo.toLocaleString('id-ID')}</span>
                </div>
                <div style="text-align:center; margin-top:20px; font-size:0.8rem;">*** END OF RECORD ***</div>
            `;
            paper.innerHTML = html;
        }

        // Hapus Per Item
        function deleteItem(id) {
            if(confirm('Hapus transaksi ini?')) {
                transactions = transactions.filter(tx => tx.id !== id);
                saveData();
                renderReceipt();
            }
        }

        // Hapus Semua
        function formatDisket() {
            if(transactions.length === 0) return alert('Data sudah kosong!');
            if(confirm('Hapus semua data secara permanen?')) {
                transactions = [];
                saveData();
                renderReceipt();
            }
        }

        // Simpan Data
        function saveData() { localStorage.setItem('pixelFinanceData', JSON.stringify(transactions)); }

        // Fitur Export ke PDF
        function downloadPDF() {
            if(transactions.length === 0) return alert('Tidak ada data untuk di-download!');
            
            const element = document.getElementById('receipt-paper');
            // Menghilangkan batasan tinggi (max-height) sementara biar semua data ter-print
            element.style.maxHeight = 'none';
            
            const opt = {
                margin:       0.5,
                filename:     'Rekap_Keuangan_Pixel.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true }, // useCORS penting biar font retro & gambar kerender
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                // Kembalikan tinggi elemen seperti semula setelah selesai download
                element.style.maxHeight = '400px';
            });
        }

        // Live Clock Taskbar
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID');
        }, 1000);

    </script>
</body>
</html>
